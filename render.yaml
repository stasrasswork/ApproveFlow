# Example Render blueprint: managed Postgres + API web service + static frontend.
# Adjust regions, plans, and env vars for your account.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: approveflow-db
    plan: free
    databaseName: approveflow
    user: approveflow

services:
  - type: web
    name: approveflow-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: approveflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: EXPOSE_DEBUG_TOKENS
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PORT
        value: 3000

  - type: web
    name: approveflow-web
    runtime: static
    buildCommand: npm ci && npm run build -w web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
