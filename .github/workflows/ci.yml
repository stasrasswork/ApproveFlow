name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shared:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint shared package
        run: npm run lint -w @approveflow/shared

      - name: Build shared package
        run: npm run build:shared

  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: approveflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d approveflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check migration naming
        run: npm run check:migrations

      - name: Validate production env checker
        run: ENV_FILE=.github/fixtures/env.prod.ci npm run check:env:prod

      - name: Lint API
        run: npm run lint -w api

      - name: Generate Prisma client
        run: npm run db:generate -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Run migrations
        run: npm exec -w api -- prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Build shared package
        run: npm run build:shared

      - name: Unit tests
        run: npm run test:unit -w api

      - name: Build API
        run: npm run build -w api

      - name: E2E tests
        run: npm run test:e2e -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public
          JWT_SECRET: ci-test-secret

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Lint Web
        run: npm run lint -w web

      - name: Unit tests
        run: npm run test -w web

      - name: Build
        run: npm run build -w web

  web-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: approveflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d approveflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Generate Prisma client
        run: npm run db:generate -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Web E2E
        run: npm run test:web:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public
          JWT_SECRET: ci-test-secret

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build API image
        run: docker build -f Dockerfile.api -t approveflow-api .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t approveflow-web .
