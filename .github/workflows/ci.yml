name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: approveflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d approveflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint -w api

      - name: Generate Prisma client
        run: npm run db:generate -w api

      - name: Run migrations
        run: npm exec -w api -- prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Unit tests
        run: npm run test:unit -w api

      - name: Build API
        run: npm run build -w api

      - name: E2E tests
        run: npm run test:e2e -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public
          JWT_SECRET: ci-test-secret

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint Web
        run: npm run lint -w web

      - name: Unit tests
        run: npm run test -w web

      - name: Build
        run: npm run build -w web
