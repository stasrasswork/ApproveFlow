name: Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - canary
          - production

jobs:
  preflight:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: approveflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d approveflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check migration naming
        run: npm run check:migrations

      - name: Validate production env checker
        run: ENV_FILE=.github/fixtures/env.prod.ci npm run check:env:prod

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npm run db:generate -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Run migrations
        run: npm exec -w api -- prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Build shared package
        run: npm run build:shared

      - name: Unit tests
        run: |
          npm run test:unit -w api
          npm run test -w web

      - name: Build
        run: npm run build

      - name: API e2e
        run: npm run test:e2e -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public
          JWT_SECRET: ci-test-secret

  web-e2e:
    needs: preflight
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: approveflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d approveflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Generate Prisma client
        run: npm run db:generate -w api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Web E2E
        run: npm run test:web:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/approveflow_test?schema=public
          JWT_SECRET: ci-test-secret

  deploy:
    needs: [preflight, web-e2e]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Production backup reminder
        if: inputs.environment == 'production'
        run: |
          echo "::warning::Run bash scripts/ops/backup-db.sh before production migrate/deploy."

      - name: Release gate checklist
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Manual deploy steps:"
          echo "1. bash scripts/ops/backup-db.sh (production only)"
          echo "2. bash scripts/ops/migrate.sh"
          echo "3. Rebuild and deploy API + Web (users must re-login after cookie-auth deploy)"
          echo "4. Post-deploy smoke (automated in next job when API_URL secret is set)"
          echo "5. Monitor error rate and p95 latency for 30-120 minutes"

      - name: Progressive rollout guidance
        run: |
          case "${{ inputs.environment }}" in
            staging)
              echo "Staging: full traffic, run restore drill if not done this week."
              ;;
            canary)
              echo "Canary: route 5-10% traffic, monitor 30-120 min before increasing."
              ;;
            production)
              echo "Production: 25% -> 50% -> 100% with rollback triggers from docs/operations/rollback.md"
              ;;
          esac

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Post-deploy smoke
        env:
          API_URL: ${{ secrets.API_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          if [[ -z "${API_URL:-}" ]]; then
            echo "::warning::Configure environment secrets to run smoke checks:"
            echo "  API_URL — public API base through /api proxy (e.g. https://app.example.com/api)"
            echo "            or direct API host (e.g. https://api.example.com)"
            echo "  SMOKE_EMAIL — test user email"
            echo "  SMOKE_PASSWORD — test user password"
            exit 0
          fi
          bash scripts/ops/smoke.sh

      - name: Monitoring reminder
        run: |
          echo "Watch for 30-120 minutes: 5xx rate, p95 latency, /health/ready, auth failures."
          echo "See docs/operations/monitoring.md"
